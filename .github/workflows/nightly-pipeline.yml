name: Nightly Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository_owner }}/risk-pipeline:latest

      - name: Run stage 1 - ingest/process
        run: |
          docker run --rm \
            -e GEMINI_API_KEY="${{ secrets.PAID_API_KEY }}" \
            -e NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            -e TOKEN="${{ secrets.TOKEN }}" \ 
            ghcr.io/${{ github.repository_owner }}/risk-pipeline:latest \
            python source/RSS_extraction.py
      - name: Run stage 2 - build datasets pt 1
        run: |
            docker run --rm \
            -e GEMINI_API_KEY="${{ secrets.PAID_API_KEY }}" \
            -e NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            -e TOKEN="${{ secrets.TOKEN }}" \ 
            ghcr.io/${{ github.repository_owner }}/risk-pipeline:latest \
            python source/BERT_update.py
      - name: Run stage 3 - build datasets pt 2
        run: |
            docker run --rm \
            -e GEMINI_API_KEY="${{ secrets.PAID_API_KEY }}" \
            -e NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}" \
            -e TOKEN="${{ secrets.TOKEN }}" \ 
            ghcr.io/${{ github.repository_owner }}/risk-pipeline:latest \
            python source/stories_build.py

      - name: Commit and push (only small/compressed files)
        run: |
          set -euo pipefail
          set -x
          trap 'echo "::error::Command failed: ${BASH_COMMAND} (line ${LINENO})"; exit 1' ERR
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # git rm --cached pipeline/resources/BERTopic_results.csv || true
          {
            echo 'BERTopic_results2.csv'
            echo 'pipeline/resources/BERTopic_results.csv'
            echo 'pipeline/resources/all_RSS.json'
            echo 'pipeline/resources/BERTopic_model'
            echo 'pipeline/resources/Story_Clusters_backup.csv'

          } | while read -r p; do
               grep -qxF "$p" .gitignore || echo "$p" >> .gitignore
            done
          git add .gitignore

          rm_cached () { for f in "$@"; do git rm --cached --ignore-unmatch -- "$f" || true; done; }
          # pipeline/resources/BERTopic_results.csv is intentionally kept tracked
          # Online_Extraction/all_RSS.json is intentionally kept tracked
          rm_cached \
            Online_Extraction/all_RSS.json.gz \
            pipeline/resources/BERTopic_model \
            BERTopic_results2.csv

          add_if_exists () {
            for f  in "$@"; do 
              if [ -f "$f" ]; then
                echo "Adding $f"
                git add "$f"
              else 
                echo "Skip (not found): $f" 
              fi 
            done
          }

          add_if_exists \
            pipeline/resources/topic_trend.csv \
            pipeline/resources/topics_BERT.json \
            pipeline/resources/unmatched_topics.json \
            pipeline/resources/label_initial.csv.gz\
            BERTopic_before.csv\
            pipeline/resources/Canonical_Stories_with_Summaries.csv\
            pipeline/resources/Articles_with_Stories.csv.gz\
            pipeline/resources/Story_Clusters.csv.gz\
            pipeline/resources/dashboard_stories.csv.gz\
            pipeline/resources/dashboard_dropdown.csv.gz\
            pipeline/resources/dashboard_articles.csv.gz\
            pipeline/resources/subtopics.csv\
            pipeline/resources/story_centroids.pkl\
            pipeline/resources/subtopic_centroids.pkl\
            pipeline/resources/final_risk_scores1.csv

          echo "== git status (porcelain) =="
          git status --porcelain=1 -uall || true
          ls -lh pipeline/resources/topic_trend.csv* || true        
          git commit -m "Update results CSV (gz) and topic trend" || echo "Nothing to commit"
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main || true

